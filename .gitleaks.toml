# gitleaks configuration for the secret-scan CI job (#218).
#
# We keep the full default ruleset (useDefault) so real credentials in source
# and config are still caught, and layer on a small allowlist for values that
# are provably NOT secrets: fake fixture tokens in unit tests. Unit test files
# legitimately embed high-entropy, secret-shaped strings (e.g. the share-token
# tests assert on a placeholder token), which otherwise trip the broad
# `generic-api-key` heuristic and fail CI on every run.
title = "Heirloom secret-scan config"

[extend]
useDefault = true

[allowlist]
description = "Non-secret fixtures used only by the test suite"
# Test files never hold real credentials in this repo — secrets live in the
# environment (see src/env.js). Scanning them only yields false positives from
# obviously-fake fixtures, so scope them out to keep the scan non-flaky.
paths = [
  '''.*\.test\.ts$''',
  '''.*\.test\.tsx$''',
]
# Belt-and-suspenders: clearly-labelled placeholder tokens (e.g.
# "tok_secret_123456789012") are fixtures, never live secrets.
regexes = [
  '''tok_secret_[0-9]+''',
]
