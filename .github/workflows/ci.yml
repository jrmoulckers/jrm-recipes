# Vercel deploys from main; this workflow is the lightweight quality gate before code lands.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. a new push to a PR) to save CI time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN (#218): every job gets read-only
# access unless it opts into more. Third-party actions below are SHA-pinned.
permissions:
  contents: read

jobs:
  # Supply-chain + secret controls (#218). Fails the build on a high/critical
  # dependency advisory and on any committed secret, keeping these cheap checks
  # separate from the heavier quality/e2e jobs.
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action lists the PR's commits via the API to scope its scan to
      # the diff; without this it 403s ("Resource not accessible by
      # integration"). Read-only — it never needs to write comments here.
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # gitleaks needs full history to scan every commit on a PR.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on known high/critical advisories in the (transitive) dependency
      # tree. Dependabot opens update PRs; this makes a vulnerable dep block CI.
      - name: Dependency audit
        run: pnpm run audit:ci

      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build | tee bundle-build.log
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_DEV_AUTH_BYPASS: "1"

      # Fail the build if a tracked route's first-load JS exceeds its budget
      # (bundle-budgets.json). Reuses the log captured above so we build once.
      - name: Bundle size budget
        run: node scripts/check-bundle-budget.mjs bundle-build.log

  # End-to-end tests, including offline PWA coverage (issue #171). Playwright
  # builds + starts the app in production mode (see playwright.config.ts), so the
  # Serwist service worker is ACTIVE during the run � `next dev` disables it, so
  # offline behavior can only be verified against a production build. A throwaway
  # Postgres (a local service container with hard-coded credentials � NOT a repo
  # secret, mirroring the lighthouse job) is migrated + seeded so the offline
  # spec can open a real recipe and enter Cook Mode; the smoke spec is
  # database-agnostic.
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heirloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/heirloom"
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DEV_AUTH_BYPASS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: node scripts/migrate.mjs

      - name: Seed demo data
        run: pnpm db:seed

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

  # Runtime performance gate (issue #205). Unlike the other jobs, this one needs
  # real content on the recipe detail route, so it seeds an ephemeral, throwaway
  # Postgres whose credentials are hard-coded here (a local service container �
  # NOT a repo secret), keeping the "no secrets" property of the rest of CI. It
  # builds, migrates + seeds, starts the app in dev-bypass mode, and runs
  # Lighthouse against the key routes with the Core Web Vitals budgets in
  # lighthouserc.cjs. Assertions fail the job on regression; reports upload as
  # artifacts for inspection.
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heirloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/heirloom"
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DEV_AUTH_BYPASS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: node scripts/migrate.mjs

      - name: Seed demo data
        run: pnpm db:seed

      - name: Build
        run: pnpm build

      - name: Lighthouse CI
        run: pnpm exec lhci autorun --config=./lighthouserc.cjs

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
