# Vercel deploys from main; this workflow is the lightweight quality gate before
# code lands. The single sequential `quality` job was split into independent,
# parallel jobs (#244) so a lint failure no longer blocks typecheck/unit/build
# feedback, and the production build is produced ONCE (the `build` job) and
# reused by E2E instead of being compiled a second time.
name: CI

on:
  # Run the full gate on pushes to main and to the long-lived staging branch
  # (#266), and on every PR targeting main.
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. a new push to a PR) to save CI time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN (#218): every job gets read-only
# access unless it opts into more. Third-party actions below are SHA-pinned.
permissions:
  contents: read

jobs:
  # Supply-chain + secret controls (#218). Fails the build on a high/critical
  # dependency advisory and on any committed secret, keeping these cheap checks
  # separate from the heavier quality/e2e jobs.
  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action lists the PR's commits via the API to scope its scan to
      # the diff; without this it 403s ("Resource not accessible by
      # integration"). Read-only — it never needs to write comments here.
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # gitleaks needs full history to scan every commit on a PR.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on known high/critical advisories in the (transitive) dependency
      # tree. Dependabot opens update PRs; this makes a vulnerable dep block CI.
      - name: Dependency audit
        run: pnpm run audit:ci

      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  # Prettier formatting gate — previously not run in CI (#244).
  format:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test

  # Fail if the committed Drizzle migrations don't match the schema (#242).
  # `drizzle-kit generate` is deterministic and needs no database, so we
  # regenerate from `src/server/db/schema` and assert the working tree stays
  # clean. A diff under `drizzle/` means someone changed the schema without
  # running `pnpm db:generate`, so the migration for their change is missing.
  migration-drift:
    name: Migration drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Regenerate migrations from schema
        run: pnpm db:generate
      - name: Assert migrations are up to date
        run: |
          if ! git diff --exit-code -- drizzle; then
            echo "::error::Drizzle migrations are out of date. Run 'pnpm db:generate' locally and commit the generated files."
            exit 1
          fi

  # Validate that the full migration chain applies cleanly to a virgin database
  # (#245). Drift (#242) proves the migrations match the schema; this proves they
  # actually run. Uses a throwaway Postgres service (hard-coded local credentials
  # — NOT a repo secret, mirroring the e2e/lighthouse jobs) and runs the migrator
  # twice to confirm it is idempotent (the second run must be a clean no-op).
  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heirloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/heirloom"
      SKIP_ENV_VALIDATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply migrations to a fresh database
        run: node scripts/migrate.mjs
      - name: Re-run migrations (must be a no-op)
        run: node scripts/migrate.mjs

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DEV_AUTH_BYPASS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Next.js's compiler cache so builds reuse work across runs (#243).
      # Keyed on the lockfile + source so it invalidates when deps or code
      # change; restore-keys allow a partial (still-useful) hit.
      - name: Cache Next.js build
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm build | tee bundle-build.log

      # Fail the build if a tracked route's first-load JS exceeds its budget
      # (bundle-budgets.json). Reuses the log captured above so we build once.
      - name: Bundle size budget
        run: node scripts/check-bundle-budget.mjs bundle-build.log

      # Publish the production build so E2E can start it directly instead of
      # rebuilding (#244). Exclude the local build cache — E2E only needs the
      # compiled output to `next start`. The Serwist service worker is emitted
      # to `public/sw.js` at build time (gitignored), so it must ride along in
      # the artifact — otherwise `pnpm start` in the E2E job serves no `/sw.js`
      # and the offline specs hang waiting for the worker to activate.
      - name: Upload build output
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: next-build
          path: |
            .next
            !.next/cache
            public/sw.js
            public/sw.js.map
            public/swe-worker-*.js
          # `.next` is a dotfile directory, so upload-artifact v4 (which excludes
          # hidden files by default) would skip its entire contents and fail with
          # "No files were found". Opt in so the production build is actually
          # published for the E2E job to consume.
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

  # End-to-end tests, including offline PWA coverage (issue #171). Playwright
  # starts the app in production mode (see playwright.config.ts) so the Serwist
  # service worker is ACTIVE during the run — `next dev` disables it, so offline
  # behavior can only be verified against a production build. It reuses the
  # `build` job's artifact and runs `pnpm start` (no second compile, #244). A
  # throwaway Postgres (a local service container with hard-coded credentials —
  # NOT a repo secret, mirroring the lighthouse job) is migrated + seeded so the
  # offline spec can open a real recipe and enter Cook Mode; the smoke spec is
  # database-agnostic.
  e2e:
    name: E2E
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heirloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/heirloom"
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DEV_AUTH_BYPASS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Reuse the production build from the `build` job instead of compiling
      # again — playwright.config.ts runs `pnpm start` (not build) under CI.
      # The artifact is rooted at the repo (it carries both `.next` and the
      # generated `public/sw.js`), so extract it at the repo root to restore
      # each file to its original path.
      - name: Download build output
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: next-build
          path: .

      - name: Run migrations
        run: node scripts/migrate.mjs

      - name: Seed demo data
        run: pnpm db:seed

      # Cache the downloaded Playwright browser binaries (#243). Keyed on the
      # lockfile so a Playwright version bump re-downloads them.
      - name: Cache Playwright browsers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

  # Runtime performance gate (issue #205). Unlike the other jobs, this one needs
  # real content on the recipe detail route, so it seeds an ephemeral, throwaway
  # Postgres whose credentials are hard-coded here (a local service container —
  # NOT a repo secret), keeping the "no secrets" property of the rest of CI. It
  # builds, migrates + seeds, starts the app in dev-bypass mode, and runs
  # Lighthouse against the key routes with the Core Web Vitals budgets in
  # lighthouserc.cjs. Assertions fail the job on regression; reports upload as
  # artifacts for inspection.
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heirloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/heirloom"
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DEV_AUTH_BYPASS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10.6.1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: node scripts/migrate.mjs

      - name: Seed demo data
        run: pnpm db:seed

      - name: Build
        run: pnpm build

      - name: Lighthouse CI
        run: pnpm exec lhci autorun --config=./lighthouserc.cjs

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
