# Keeps dependencies and GitHub Actions up to date with automatic PRs.
# Dependabot understands pnpm lockfiles under the "npm" ecosystem.
version: 2
updates:
  # Application dependencies (package.json / pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Batch low-risk bumps into a couple of PRs to cut noise; majors stay solo
    # so breaking changes get their own review.
    groups:
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # The Actions used by the CI / CodeQL workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
