# Local Postgres for Heirloom development.
#   docker compose up -d
# Matches the default DATABASE_URL in .env.example.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heirloom
    ports:
      - "5432:5432"
    volumes:
      - heirloom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d heirloom"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  heirloom_pgdata:
